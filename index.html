<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwrok 1</title>
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="p-4 bg-white border rounded" style="width: 350px;">
        <h2 class="text-center mb-3">Login</h2>

        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter here">
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password">
        </div>

        <div class="form-check mb-3">
            <input type="checkbox" id="stayLoggedIn" class="form-check-input">
            <label for="stayLoggedIn" class="form-check-label">Stay logged in</label>
        </div>
        
        <div class="d-flex justify-content-between">
            <button class="btn btn-primary" onclick="login()">Login</button>
            <button class="btn btn-secondary">Cancel</button>
        </div>

        <div class="mt-3 text-center">
            a href="#">Forgot username / password?</a>

        </div>
    </div>
    
</body>
</html>
